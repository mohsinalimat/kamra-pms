name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Verify production serve base
        # The served SPA must reference its assets under /assets/kamra/frontend/;
        # a wrong base here silently breaks the /kamra install.
        run: grep -q "/assets/kamra/frontend/assets/" kamra/public/frontend/index.html

  evals:
    name: Backend eval harness
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mariadb:
        image: mariadb:11.8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          path: apps/kamra

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y redis-server mariadb-client
          sudo service redis-server start
          npm install -g yarn

      - name: Configure MariaDB
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "
            SET GLOBAL character_set_server = 'utf8mb4';
            SET GLOBAL collation_server = 'utf8mb4_unicode_ci';"

      - name: Init bench
        run: |
          pip install frappe-bench
          # pinned to the stable release tag: the version-16 branch tip
          # currently ships an UnboundLocalError in frappe/locale.py
          bench init --skip-redis-config-generation --skip-assets \
            --frappe-branch v16.25.0 frappe-bench
          cd frappe-bench
          bench set-config -g db_host 127.0.0.1
          bench set-config -g redis_cache redis://127.0.0.1:6379
          bench set-config -g redis_queue redis://127.0.0.1:6379
          bench set-config -g redis_socketio redis://127.0.0.1:6379

      - name: Install app & site
        run: |
          cd frappe-bench
          bench get-app payments
          bench get-app kamra "${GITHUB_WORKSPACE}/apps/kamra"
          bench new-site test.localhost \
            --mariadb-user-host-login-scope='%' \
            --db-root-password root --admin-password admin
          bench --site test.localhost install-app kamra
          bench --site test.localhost set-config developer_mode 1

      - name: Run eval harness
        run: |
          cd frappe-bench
          printf 'from kamra.scripts.eval_harness import execute\nexecute()\nexit\n' \
            | bench --site test.localhost console | tee eval.out
          grep -q "21/21 passed" eval.out

      - name: Run front-desk persona journey
        run: |
          cd frappe-bench
          printf 'from kamra.scripts.frontdesk_eval import execute\nexecute()\nexit\n' \
            | bench --site test.localhost console | tee journey.out
          grep -q "13/13 passed" journey.out

      - name: Fresh-install correctness (roles bind, SPA serves)
        run: |
          cd frappe-bench
          cat > /tmp/fresh_check.py <<'PY'
          import os, frappe
          roles = ["Front Desk","Housekeeping","Finance","Revenue Manager","Kamra Agent","Hotel Admin"]
          missing = [r for r in roles if not frappe.db.exists("Role", r)]
          assert not missing, f"roles auto-create failed: {missing}"
          assert frappe.get_all("DocPerm", filters={"parent":"Reservation"}), "no Reservation perms bound"
          assert os.path.exists(frappe.get_app_path("kamra","public","frontend","index.html")), "built SPA not shipped"
          assert os.path.exists(frappe.get_app_path("kamra","www","kamra.py")), "SPA boot page missing"
          rules = str(frappe.get_hooks("website_route_rules"))
          assert "/kamra/<path:app_path>" in rules, "/kamra route rule missing"
          print("FRESH-INSTALL CHECKS PASSED")
          PY
          printf 'exec(open("/tmp/fresh_check.py").read())\nexit\n' \
            | bench --site test.localhost console | tee fresh.out
          grep -q "FRESH-INSTALL CHECKS PASSED" fresh.out
