name: Release

# Publishes release artifacts for a tag:
#   1. GitHub Release        (only when a tag is pushed by hand — the
#                             release-please flow creates the Release itself)
#   2. Docker image          ghcr.io/kamra-pms/kamra:<tag> + :latest
#                            (the self-host one-click channel)
#   3. Demo deploy           demo.kamrapms.com via SSH -> redeploy.sh
#
# Invoked three ways: manual tag push, workflow_call from release-please.yml
# (tags created with GITHUB_TOKEN never fire the tag-push trigger), or
# workflow_dispatch for re-runs.

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  github-release:
    name: Publish GitHub Release
    # Only for hand-pushed tags; release-please already created the Release.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # When called from release-please (workflow_call), github.ref is
          # `main`, not the tag - pass the tag explicitly or the action
          # fails with "GitHub Releases requires a tag". Idempotent: if
          # release-please already published the release, this updates it.
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: Kamra PMS ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          # CHANGELOG.md stays the curated, human record; this auto-summary
          # from PR/commit titles supplements it on the Release page.

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker

      - name: Write apps.json
        # Same layered build the demo VPS uses; kamra pinned to the release
        # tag so the image is reproducible.
        run: |
          cat > apps.json <<EOF
          [
            {"url": "https://github.com/frappe/payments", "branch": "develop"},
            {"url": "https://github.com/Kamra-PMS/kamra-pms", "branch": "${{ steps.tag.outputs.tag }}"}
          ]
          EOF

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/layered/Containerfile
          push: true
          tags: |
            ghcr.io/kamra-pms/kamra:${{ steps.tag.outputs.tag }}
            ghcr.io/kamra-pms/kamra:latest
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            CACHE_BUST=${{ steps.tag.outputs.tag }}
          secret-files: |
            apps_json=./apps.json

  deploy-demo:
    name: Deploy demo.kamrapms.com
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "Deploy secrets not configured - skipping demo deploy."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # same pre-deploy self-heal as nightly: prune, and shed running
          # containers' writable layers when the disk is critical
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER:-root}@${DEPLOY_HOST}" \
            "df -h / | tail -1; docker system prune -af 2>/dev/null | tail -1; df -h / | tail -1"
          # same asset-tar bound as nightly (see nightly.yml) - idempotent
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER:-root}@${DEPLOY_HOST}" \
            "sed -i 's|tar -C /home/frappe/frappe-bench -chf |timeout 300 tar -C /home/frappe/frappe-bench --exclude=node_modules -chf |' ~/kamra-deploy/redeploy.sh || true"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER:-root}@${DEPLOY_HOST}" \
            "bash ~/kamra-deploy/redeploy.sh stable '${{ steps.tag.outputs.tag }}'"
          # refresh the demo's showcase data (idempotent) so new demo
          # content - menu, tables, laundry rates, tickets - shows up
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER:-root}@${DEPLOY_HOST}" bash -s <<'SEED'
          cd ~/kamra-deploy/frappe_docker
          docker compose --project-name kamra --env-file kamra.env \
            -f compose.yaml -f overrides/compose.mariadb.yaml \
            -f overrides/compose.redis.yaml -f overrides/compose.noproxy.yaml \
            exec -T backend bench --site demo.kamrapms.com \
            execute kamra.scripts.seed_showcase.execute || true
          SEED
